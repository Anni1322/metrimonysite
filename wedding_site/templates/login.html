{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">लॉगिन करें</h2>
        </div>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/30">
                प्रवेश करें
            </button>
        </form>
        <div class="mt-6 text-center space-y-4">
            <div>
                <a href="{% url 'pages_register' %}" class="text-sm text-gray-500 hover:text-primary transition-colors">नया खाता बनाना चाहते हैं?</a>
            </div>
            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">या</span>
                </div>
            </div>
            <div>
                <a href="{% url 'forgot_password' %}" class="inline-block px-6 py-2.5 bg-gradient-to-r from-saffron to-saffron/80 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-saffron/30 transition-all">
                    <span class="material-symbols-outlined align-middle mr-2">lock_reset</span> पासवर्ड भूल गए?
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling for the Django built-in Auth Forms */
    form p { margin-bottom: 1.5rem; }
    form label { display: block; font-size: 0.75rem; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 0.5rem; }
    form input { width: 100%; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.875rem; }
    form input:focus { border-color: #f26522; outline: none; ring: 2px; ring-color: #f26522; }
</style>
{% endblock %}
